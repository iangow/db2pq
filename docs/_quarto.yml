project:
  type: website

execute:
  freeze: auto

metadata-files:
  - reference/_sidebar.yml

website:
  title: db2pq

format:
  html:
    theme: cosmo
    toc: true
    css:
      - theme.css
      - reference/_styles-quartodoc.css

quartodoc:
  style: pkgdown
  dir: reference
  title: API Reference
  package: db2pq
  dynamic: true
  sidebar:
    file: reference/_sidebar.yml
    collapse-level: 1
    contents:
      - text: Home
        href: index.qmd
      - section: Workflows
        contents:
          - authentication.qmd
          - data-management.qmd
          - using-parquet-with-polars.qmd
          - wrds-to-pq.qmd
          - web-query.qmd
          - wrds-to-pg.qmd
          - pg-to-pq.qmd
          - pq-to-pg.qmd
      - section: Examples
        contents:
          - parquet-utilities-examples.qmd
      - section: Reference
        contents:
          - "{{ contents }}"
  css: reference/_styles-quartodoc.css
  sections:
    - title: Parquet Export
      desc: Helpers for exporting PostgreSQL and WRDS data into Parquet files.
      contents:
        - db_to_pq
        - pg_update_pq
        - wrds_pg_to_pq
        - wrds_sql_to_pq
        - db_schema_to_pq
        - wrds_update_pq
        - wrds_update_schema
        - ibis_to_pq
    - title: PostgreSQL Sync
      desc: Helpers for materializing WRDS, PostgreSQL, and Parquet data into PostgreSQL.
      contents:
        - db_to_pg
        - wrds_pg_to_pg
        - wrds_update_pg
        - pq_to_pg
        - pq_update_pg
        - process_sql
        - db_schema_tables
        - wrds_get_tables
        - set_table_comment
    - title: Parquet Utilities
      desc: Helpers for managing and inspecting parquet files produced by db2pq.
      contents:
        - pq_list_files
        - pq_last_modified
        - pq_archive
        - pq_restore
        - pq_remove
    - title: Configuration
      desc: Helpers for engine defaults and runtime behavior.
      contents:
        - set_default_engine
        - get_default_engine
